name: Update Mermaid Model Diagram

on:
  push:
    branches:
      - "**"
    paths:
      - "models.py"
      - "scripts/generate_mermaid_models.py"
      - ".github/workflows/update-mermaid-model-diagram.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-diagram:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Regenerate Mermaid diagram
        run: python scripts/generate_mermaid_models.py

      - name: Commit diagram if changed
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/architecture/models-class-diagram.md
            git commit -m "chore: update models Mermaid diagram"
            git push
          else
            echo "No diagram updates needed."
          fi
