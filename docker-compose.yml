services:
  postgres:
    image: postgres:16
    container_name: watchtower-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: watchtower
    ports:
      - "5432:5432"
    volumes:
      - watchtower_data:/var/lib/postgresql/data

volumes:
  watchtower_data: