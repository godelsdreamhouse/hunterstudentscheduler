services:

  postgres:
    image: postgres:16
    container_name: watchtower-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: watchtower
    ports:
      - "5432:5432"
    volumes:
      - watchtower_data:/var/lib/postgresql/data
      # Mount SQL files for auto-loading
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      # ./scripts/seed_data.sql:/docker-entrypoint-initdb.d/03-seed-data.sql:ro

volumes:
  watchtower_data: