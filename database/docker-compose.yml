services:

  postgres:
    image: postgres:16
    container_name: watchtower-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: watchtower
    ports:
      - "5432:5432"
    volumes:
      - watchtower_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./migrations:/watchtower-db/migrations:ro
      - ./refresh_program_elective_courses.sql:/watchtower-db/refresh_program_elective_courses.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  watchtower_data:
